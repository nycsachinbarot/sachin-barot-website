name: Site CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-static-site:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required site files exist
        run: |
          set -euo pipefail
          required_files=(
            index.html
            story.html
            retreat.html
            writing.html
            style.css
            app.js
            vercel.json
          )

          for file in "${required_files[@]}"; do
            if [[ ! -f "$file" ]]; then
              echo "Missing required file: $file"
              exit 1
            fi
          done

      - name: Validate basic HTML structure
        run: |
          set -euo pipefail
          for page in index.html story.html retreat.html writing.html; do
            grep -q "<!DOCTYPE html>" "$page" || (echo "$page missing doctype" && exit 1)
            grep -q "<html" "$page" || (echo "$page missing <html>" && exit 1)
            grep -q "</html>" "$page" || (echo "$page missing </html>" && exit 1)
          done

      - name: Confirm Vercel config is present
        run: |
          set -euo pipefail
          test -f vercel.json
          grep -q '"headers"' vercel.json
